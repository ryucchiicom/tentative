<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本の伝統色 - 色見本帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F2E7;
    --paper-deep:#EFE9D8;
    --ink:#2A241C;
    --ink-soft:#5C5346;
    --hairline:#D9D0BA;
    --accent: transparent;
    --accent-soft: rgba(0,0,0,0.03);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Noto Sans JP',sans-serif;
    font-weight:300;
    transition:background-color 0.6s ease;
    background-image:
      repeating-linear-gradient(0deg, rgba(0,0,0,0.012) 0px, rgba(0,0,0,0.012) 1px, transparent 1px, transparent 3px);
  }
  body.tinted{ background-color: var(--accent-soft); }

  ::selection{ background:var(--ink); color:var(--paper); }

  /* ---------- header ---------- */
  header{
    padding:8vw 6vw 5vw;
    max-width:1000px;
    margin:0 auto;
    position:relative;
  }
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:0.18em;
    color:var(--ink-soft);
    text-transform:uppercase;
    margin-bottom:1.4rem;
  }
  h1{
    font-family:'Noto Serif JP',serif;
    font-weight:600;
    font-size:clamp(2.6rem, 7vw, 5rem);
    line-height:1.15;
    margin:0 0 1.6rem;
    letter-spacing:0.02em;
  }
  header p.lead{
    font-size:16px;
    line-height:2;
    color:var(--ink-soft);
    max-width:36em;
    margin:0;
  }
  .strip{
    display:flex;
    height:14px;
    margin-top:3.2rem;
    border:0.5px solid var(--hairline);
  }
  .strip span{flex:1;}

  /* ---------- nav tabs (色見本帳の背に見立てたタブ) ---------- */
  nav.tabs{
    position:sticky;
    top:0;
    z-index:20;
    background:var(--paper);
    border-bottom:1px solid var(--hairline);
    backdrop-filter:blur(4px);
  }
  .tabs-inner{
    max-width:1000px;
    margin:0 auto;
    display:flex;
    overflow-x:auto;
    scrollbar-width:none;
  }
  .tabs-inner::-webkit-scrollbar{display:none;}
  nav.tabs button{
    flex:0 0 auto;
    font-family:'Noto Serif JP',serif;
    font-size:14px;
    background:none;
    border:none;
    border-right:1px solid var(--hairline);
    padding:14px 20px;
    color:var(--ink-soft);
    cursor:pointer;
    white-space:nowrap;
    position:relative;
  }
  nav.tabs button::after{
    content:'';
    position:absolute;
    left:0; right:0; bottom:0;
    height:2px;
    background:var(--group-color, var(--ink));
    transform:scaleX(0);
    transition:transform 0.25s ease;
  }
  nav.tabs button:hover{ color:var(--ink); }
  nav.tabs button.active{ color:var(--ink); }
  nav.tabs button.active::after{ transform:scaleX(1); }

  /* ---------- sections ---------- */
  main{ max-width:1000px; margin:0 auto; padding:0 6vw 8vw; }
  section.group{ padding-top:4.5rem; scroll-margin-top:60px; }
  .group-head{
    display:flex;
    align-items:baseline;
    gap:1rem;
    margin-bottom:0.4rem;
    border-bottom:1px solid var(--hairline);
    padding-bottom:0.9rem;
  }
  .group-head .dot{
    width:9px; height:9px; border-radius:50%;
    background:var(--group-color);
    flex:0 0 auto;
  }
  .group-head h2{
    font-family:'Noto Serif JP',serif;
    font-weight:500;
    font-size:22px;
    margin:0;
  }
  .group-head .count{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--ink-soft);
    margin-left:auto;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));
    gap:1px;
    background:var(--hairline);
    border:1px solid var(--hairline);
    margin-top:1.5rem;
  }
  .card{
    background:var(--paper);
    padding:0;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    transition:background-color 0.4s ease;
  }
  .card:hover{ background:var(--paper-deep); }
  .card.selected{ background:var(--paper-deep); }
  .swatch{
    aspect-ratio:5/4;
    width:100%;
    position:relative;
    border-bottom:1px solid var(--hairline);
  }
  .swatch .hex-tag{
    position:absolute;
    bottom:8px; left:10px;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:0.03em;
    opacity:0;
    transition:opacity 0.3s ease;
    mix-blend-mode:difference;
    color:#fff;
  }
  .card:hover .hex-tag, .card.selected .hex-tag{ opacity:0.85; }
  .meta{ padding:14px 16px 18px; }
  .meta .kanji{
    font-family:'Noto Serif JP',serif;
    font-weight:500;
    font-size:19px;
    margin:0 0 2px;
  }
  .meta .yomi{
    font-size:11px;
    color:var(--ink-soft);
    letter-spacing:0.04em;
    margin:0 0 10px;
  }
  .meta .desc{
    font-size:12.5px;
    line-height:1.75;
    color:var(--ink-soft);
    margin:0;
  }

  footer{
    max-width:1000px;
    margin:0 auto;
    padding:3rem 6vw 5rem;
    border-top:1px solid var(--hairline);
    font-size:12px;
    color:var(--ink-soft);
    line-height:2;
  }

  @media (max-width:560px){
    header{ padding:14vw 6vw 8vw; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Nihon no Dentou-shoku / 色見本帳</div>
  <h1>日本の伝統色</h1>
  <p class="lead">
    四季の景色や染料、鉱物の名から生まれた色の名前たち。一枚一枚に、それが生まれた景色がある。
    タブから系統を選ぶか、下へ辿って、気になる色をタップしてみてください。
  </p>
  <div class="strip" id="strip"></div>
</header>

<nav class="tabs">
  <div class="tabs-inner" id="tabs"></div>
</nav>

<main id="main"></main>

<footer>
  色名・色相の分類は伝統的な染色・顔料の名称に基づく一般的な目安です。実際の発色は素材や時代、資料により幅があります。
</footer>

<script>
const DATA = [
  { group:'赤系', color:'#C7003F', kanji:'紅色', yomi:'べにいろ',
    desc:'紅花の芯だけを幾度も重ねて染めた、燃えるような赤。祝いの席にふさわしい色とされた。' },
  { group:'赤系', color:'#EB6238', kanji:'朱色', yomi:'しゅいろ',
    desc:'神社の鳥居や漆器に使われる、明るく力強い赤橙。魔を退ける色として古くから信じられた。' },
  { group:'赤系', color:'#9E3D3F', kanji:'蘇芳', yomi:'すおう',
    desc:'蘇芳の木の芯材から取る、渋みを帯びた赤紫。紅よりも落ち着いた大人の色として好まれた。' },
  { group:'赤系', color:'#E9546B', kanji:'紅梅色', yomi:'こうばいいろ',
    desc:'早春に咲く紅梅の花びらの色。雪の残る庭先にひときわ映える、明るい紅。' },
  { group:'赤系', color:'#F19072', kanji:'東雲色', yomi:'しののめいろ',
    desc:'夜明け、東の空がわずかに染まる瞬間の色。一日の始まりを告げる淡い橙紅。' },

  { group:'橙黄系', color:'#F8B500', kanji:'山吹色', yomi:'やまぶきいろ',
    desc:'山吹の花のような、金色に近い黄。小判の色とも呼ばれ、豊かさの象徴だった。' },
  { group:'橙黄系', color:'#F8B862', kanji:'卵色', yomi:'たまごいろ',
    desc:'鶏卵の黄身を思わせる、優しく温かみのある黄。日常の中にある、ささやかな色。' },
  { group:'橙黄系', color:'#A15C38', kanji:'檜皮色', yomi:'ひわだいろ',
    desc:'屋根を葺く檜の樹皮の色。年月を経た木肌のような、深く落ち着いた茶褐色。' },
  { group:'橙黄系', color:'#D3B88C', kanji:'亜麻色', yomi:'あまいろ',
    desc:'亜麻の繊維をそのまま紡いだような、淡く乾いた黄褐色。素朴で控えめな風合い。' },

  { group:'緑系', color:'#AACF53', kanji:'萌黄色', yomi:'もえぎいろ',
    desc:'早春、木々が一斉に芽吹く瞬間の若葉の色。生命力に満ちた黄緑。' },
  { group:'緑系', color:'#C3D825', kanji:'若草色', yomi:'わかくさいろ',
    desc:'萌黄色よりもさらに明るく、生まれたばかりの草の色。初々しさの象徴。' },
  { group:'緑系', color:'#B7BA6B', kanji:'抹茶色', yomi:'まっちゃいろ',
    desc:'茶道に用いる抹茶の粉のような、渋く深みのある黄緑。静けさをまとう色。' },
  { group:'緑系', color:'#007B43', kanji:'常磐色', yomi:'ときわいろ',
    desc:'常緑樹の葉のように、一年を通して変わらぬ深い緑。不変と長寿を願う色。' },

  { group:'青系', color:'#165E83', kanji:'藍色', yomi:'あいいろ',
    desc:'藍甕で幾度も染め重ねた、深く沈んだ青。日本の日常着を支え続けた色。' },
  { group:'青系', color:'#1E50A2', kanji:'瑠璃色', yomi:'るりいろ',
    desc:'仏教の七宝のひとつ、瑠璃の石の色。澄みきった、気高い紫みの青。' },
  { group:'青系', color:'#4C6CB3', kanji:'群青色', yomi:'ぐんじょういろ',
    desc:'鉱物の群青を砕いて作る顔料の色。日本画の空や海に欠かせない鮮やかな青。' },
  { group:'青系', color:'#00A3AF', kanji:'浅葱色', yomi:'あさぎいろ',
    desc:'葱の若葉のような、明るく澄んだ青緑。夏の装いに好まれた爽やかな色。' },
  { group:'青系', color:'#16294D', kanji:'鉄紺', yomi:'てつこん',
    desc:'鉄がわずかに帯びる青みを思わせる、ほとんど黒に近い深い紺。武具にも用いられた。' },

  { group:'紫系', color:'#7058A3', kanji:'菫色', yomi:'すみれいろ',
    desc:'道端にひっそり咲く菫の花の色。控えめでありながら、芯の強さを感じさせる紫。' },
  { group:'紫系', color:'#745399', kanji:'江戸紫', yomi:'えどむらさき',
    desc:'江戸で好まれた、青みの強い粋な紫。歌舞伎の鉢巻にも使われた都の色。' },

  { group:'白黒系', color:'#FFFDF5', kanji:'胡粉色', yomi:'ごふんいろ',
    desc:'貝殻を砕いて作る顔料、胡粉の色。日本画や人形の肌に用いる、温かな白。' },
  { group:'白黒系', color:'#262421', kanji:'墨色', yomi:'すみいろ',
    desc:'墨をすって生まれる、限りなく黒に近い色。濃淡だけで世界を描く水墨画の色。' },
];

const GROUP_COLORS = {
  '赤系':'#C7003F', '橙黄系':'#D97706', '緑系':'#4D7C2A',
  '青系':'#1E50A2', '紫系':'#745399', '白黒系':'#57534A'
};

const groups = [...new Set(DATA.map(d=>d.group))];

// ---- header strip ----
const strip = document.getElementById('strip');
DATA.forEach(d=>{
  const s = document.createElement('span');
  s.style.background = d.color;
  strip.appendChild(s);
});

// ---- tabs ----
const tabsEl = document.getElementById('tabs');
groups.forEach((g,i)=>{
  const btn = document.createElement('button');
  btn.textContent = g;
  btn.style.setProperty('--group-color', GROUP_COLORS[g]);
  if(i===0) btn.classList.add('active');
  btn.addEventListener('click', ()=>{
    document.getElementById('sec-'+g).scrollIntoView({behavior:'smooth', block:'start'});
  });
  tabsEl.appendChild(btn);
});

// ---- sections ----
const main = document.getElementById('main');
groups.forEach(g=>{
  const sec = document.createElement('section');
  sec.className = 'group';
  sec.id = 'sec-'+g;

  const head = document.createElement('div');
  head.className = 'group-head';
  head.innerHTML = `<span class="dot" style="background:${GROUP_COLORS[g]}"></span>
                     <h2>${g}</h2>
                     <span class="count">${DATA.filter(d=>d.group===g).length} 色</span>`;
  sec.appendChild(head);

  const grid = document.createElement('div');
  grid.className = 'grid';

  DATA.filter(d=>d.group===g).forEach(d=>{
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="swatch" style="background:${d.color}">
        <span class="hex-tag">${d.color}</span>
      </div>
      <div class="meta">
        <p class="kanji">${d.kanji}</p>
        <p class="yomi">${d.yomi}</p>
        <p class="desc">${d.desc}</p>
      </div>`;
    card.addEventListener('click', ()=>{
      const wasSelected = card.classList.contains('selected');
      document.querySelectorAll('.card.selected').forEach(c=>c.classList.remove('selected'));
      if(!wasSelected){
        card.classList.add('selected');
        document.documentElement.style.setProperty('--accent-soft', hexToSoft(d.color));
        document.body.classList.add('tinted');
      } else {
        document.body.classList.remove('tinted');
      }
    });
    grid.appendChild(card);
  });

  sec.appendChild(grid);
  main.appendChild(sec);
});

function hexToSoft(hex){
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},0.05)`;
}

// ---- scroll spy for tabs ----
const sections = groups.map(g=>document.getElementById('sec-'+g));
const tabButtons = [...tabsEl.children];
const io = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      const idx = sections.indexOf(e.target);
      tabButtons.forEach(b=>b.classList.remove('active'));
      if(idx>=0) tabButtons[idx].classList.add('active');
    }
  });
}, { rootMargin: '-20% 0px -70% 0px' });
sections.forEach(s=>io.observe(s));
</script>
</body>
</html>
