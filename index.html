<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シンプルUIサイト</title>
  <style>
    body {
      margin: 0;
      font-family: 'Helvetica Neue', sans-serif;
      background-color: #f5f5f5;
      color: #333;
    }
    header {
      background-color: #ffffff;
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #ddd;
    }
    header h1 {
      margin: 0;
      font-size: 24px;
    }
    nav {
      background-color: #fafafa;
      display: flex;
      justify-content: center;
      border-bottom: 1px solid #eee;
    }
    nav a {
      padding: 15px 20px;
      text-decoration: none;
      color: #555;
      transition: color 0.3s;
    }
    nav a:hover {
      color: #000;
    }
    main {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    main h2 {
      padding: 20px;
      margin: 0;
      border-bottom: 1px solid #eee;
    }
    main p {
      padding: 20px;
      line-height: 1.6;
    }
    footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>
  <header>
    <h1>シンプルなUIサイト</h1>
  </header>
  <nav>
    <a href="#">ホーム</a>
    <a href="#">サービス</a>
    <a href="#">お問い合わせ</a>
  </nav>
  <main>
    <h2>UIにこだわったシンプルサイト</h2>
    <p>
      このサイトはシンプルなデザインながら、直感的で使いやすいUIを目指しています。
      視覚的に心地よく、必要な情報にすぐアクセスできるよう配慮しています。
    </p>
  </main>
  <footer>
    &copy; 2026 Simple UI Site
  </footer>
</body>
</html>
