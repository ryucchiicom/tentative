<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Wave</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Segoe UI",sans-serif;
    background:#090b15;
    color:white;
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 30%,#4f46e533,transparent 35%),
        radial-gradient(circle at 80% 70%,#00d4ff22,transparent 35%),
        linear-gradient(#090b15,#0f172a);
    z-index:-2;
}

.grid{
    position:fixed;
    inset:0;
    background-image:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
    background-size:40px 40px;
    mask-image:linear-gradient(to bottom,black,transparent);
    z-index:-1;
}

header{
    padding:25px 10%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#00d4ff;
}

nav a{
    text-decoration:none;
    color:white;
    margin-left:20px;
    transition:.3s;
}

nav a:hover{
    color:#00d4ff;
}

.hero{
    min-height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
}

.hero h1{
    font-size:clamp(45px,8vw,90px);
    background:linear-gradient(90deg,#00d4ff,#8b5cf6,#00d4ff);
    background-size:300%;
    -webkit-background-clip:text;
    color:transparent;
    animation:gradient 8s linear infinite;
}

@keyframes gradient{
    to{
        background-position:300%;
    }
}

.hero p{
    max-width:650px;
    margin-top:20px;
    opacity:.8;
    line-height:1.8;
}

button{
    margin-top:40px;
    padding:15px 35px;
    font-size:18px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    color:white;
    background:linear-gradient(90deg,#00d4ff,#8b5cf6);
    transition:.3s;
    box-shadow:0 0 25px #00d4ff55;
}

button:hover{
    transform:translateY(-5px) scale(1.05);
    box-shadow:0 0 40px #00d4ffaa;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    padding:80px 10%;
}

.card{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1);
    border-radius:20px;
    padding:30px;
    backdrop-filter:blur(10px);
    transition:.3s;
}

.card:hover{
    transform:translateY(-10px);
    border-color:#00d4ff;
}

.card h2{
    margin-bottom:15px;
    color:#00d4ff;
}

footer{
    text-align:center;
    padding:40px;
    opacity:.6;
}

#circle{
    position:fixed;
    width:25px;
    height:25px;
    border:2px solid #00d4ff;
    border-radius:50%;
    pointer-events:none;
    transform:translate(-50%,-50%);
    transition:transform .1s;
}
</style>
</head>
<body>

<div class="grid"></div>
<div id="circle"></div>

<header>
<div class="logo">FutureWave</div>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Works</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="hero">
<h1>未来をデザインする。</h1>

<p>
美しいアニメーションとシンプルなデザインを組み合わせた、
HTML・CSS・JavaScriptだけで動作するサンプルページです。
</p>

<button onclick="hello()">始める</button>
</section>

<section class="cards">

<div class="card">
<h2>⚡ Speed</h2>
<p>軽量で高速に表示されるシンプルな設計。</p>
</div>

<div class="card">
<h2>🎨 Design</h2>
<p>グラデーションやガラス風デザインを採用。</p>
</div>

<div class="card">
<h2>🚀 Animation</h2>
<p>JavaScriptとCSSだけで滑らかな動きを実現。</p>
</div>

</section>

<footer>
© 2026 FutureWave
</footer>

<script>
function hello(){
    alert("ようこそ FutureWave へ！");
}

const circle=document.getElementById("circle");

window.addEventListener("mousemove",e=>{
    circle.style.left=e.clientX+"px";
    circle.style.top=e.clientY+"px";
});
</script>

</body>
</html>
